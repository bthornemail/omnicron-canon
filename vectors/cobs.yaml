# COBS Conformance Vectors
# Canonical source: omnicron-canon/vectors/cobs.yaml
# Consumed by: omnicron-isa
#
# COBS (Consistent Overhead Byte Stuffing) rules:
#   code byte ∈ 0x01..0xFF
#   0x00 is invalid inside the encoded body
#   external 0x00 terminates a frame
#   0xFF denotes a 254-byte nonzero run without an inserted zero
#
# Required invariant:
#   decode(encode(x)) = x

schema: cobs
version: "1.0"

vectors:
  # ------------------------------------------------------------------
  # Empty payload
  # ------------------------------------------------------------------
  - id: cobs-empty
    input: []
    encoded: [0x01]
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # Single zero
  # ------------------------------------------------------------------
  - id: cobs-single-zero
    input: [0x00]
    encoded: [0x02, 0x01]
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # Leading zero
  # ------------------------------------------------------------------
  - id: cobs-leading-zero
    input: [0x00, 0x01, 0x02, 0x03]
    encoded: [0x02, 0x01, 0x01, 0x01, 0x04]
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # Trailing zero
  # ------------------------------------------------------------------
  - id: cobs-trailing-zero
    input: [0x01, 0x02, 0x03, 0x00]
    encoded: [0x04, 0x01, 0x02, 0x03, 0x01]
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # Embedded zeros
  # ------------------------------------------------------------------
  - id: cobs-embedded-zeros
    input: [0x01, 0x00, 0x02, 0x00, 0x03]
    encoded: [0x02, 0x01, 0x02, 0x02, 0x02, 0x03, 0x01]
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # 254 nonzero bytes
  # ------------------------------------------------------------------
  - id: cobs-254-nonzero
    description: "254 nonzero bytes require 0xFF code byte"
    input_pattern: "nonzero-254"
    input_length: 254
    encoded_pattern: "0xFF + 254 bytes"
    encoded_length: 255
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # 255 nonzero bytes
  # ------------------------------------------------------------------
  - id: cobs-255-nonzero
    description: "255 nonzero bytes: 0xFF + 254 bytes + code byte + 1 byte"
    input_pattern: "nonzero-255"
    input_length: 255
    encoded_pattern: "0xFF + 254 bytes + 0x02 + 1 byte"
    encoded_length: 257
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # Invalid zero code byte
  # ------------------------------------------------------------------
  - id: cobs-invalid-zero-code
    description: "0x00 as code byte is invalid"
    encoded: [0x00]
    expected: { valid: false, error: "zero code byte" }

  # ------------------------------------------------------------------
  # Truncated block
  # ------------------------------------------------------------------
  - id: cobs-truncated-block
    description: "Code byte claims more bytes than available"
    encoded: [0x05, 0x01, 0x02]
    expected: { valid: false, error: "truncated block" }

  # ------------------------------------------------------------------
  # Missing external delimiter
  # ------------------------------------------------------------------
  - id: cobs-missing-delimiter
    description: "Frame without terminating zero"
    encoded: [0x03, 0x01, 0x02, 0x03]
    expected: { valid: false, error: "missing external delimiter" }

  # ------------------------------------------------------------------
  # Single nonzero byte
  # ------------------------------------------------------------------
  - id: cobs-single-nonzero
    input: [0x42]
    encoded: [0x02, 0x42]
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # All zeros
  # ------------------------------------------------------------------
  - id: cobs-all-zeros
    input: [0x00, 0x00, 0x00]
    encoded: [0x02, 0x02, 0x02, 0x01]
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # Boundary values
  # ------------------------------------------------------------------
  - id: cobs-byte-0x01
    input: [0x01]
    encoded: [0x02, 0x01]
    expected: { valid: true, roundtrip: true }

  - id: cobs-byte-0xFE
    input: [0xFE]
    encoded: [0x02, 0xFE]
    expected: { valid: true, roundtrip: true }

  - id: cobs-byte-0xFF
    input: [0xFF]
    encoded: [0x02, 0xFF]
    expected: { valid: true, roundtrip: true }

invariants:
  - "decode(encode(x)) = x for all valid payloads"
  - "encoded output contains no zero bytes inside body"
  - "code byte is always 0x01..0xFF"
  - "0xFF code byte means 254-byte nonzero run"
  - "frame termination is external 0x00"
  - "truncation is detected and rejected"
  - "missing delimiter is detected and rejected"
