# Activation Conformance Vectors
# Canonical source: omnicron-canon/vectors/activation.yaml
# Consumed by: omnicron-lisp
#
# Activation has two distinct layers:
#   1. Declaration request (non-authoritative)
#   2. Validated result (authoritative, requires validation + receipt)
#
# A positive request does NOT equal an accepted result.

schema: activation
version: "1.0"

requests:
  - id: request-invalid
    value: -1
    meaning: "invalid activation request"

  - id: request-unresolved
    value: 0
    meaning: "unresolved activation request"

  - id: request-positive
    value: 1
    meaning: "positive activation request"

results:
  - id: result-invalid
    value: -1
    meaning: "invalid activation result"

  - id: result-unresolved
    value: 0
    meaning: "unresolved activation result"

  - id: result-accepted
    value: 1
    meaning: "accepted activation result (requires validation + receipt)"

vectors:
  # ------------------------------------------------------------------
  # Request → Result mapping
  # ------------------------------------------------------------------
  - id: activation-invalid-request
    request: -1
    validation: { passed: false }
    receipt: { emitted: false }
    expected_result: -1
    expected_authority: { accepted: 0, validated: 0, receipted: 0 }

  - id: activation-unresolved-request
    request: 0
    validation: { passed: false }
    receipt: { emitted: false }
    expected_result: 0
    expected_authority: { accepted: 0, validated: 0, receipted: 0 }

  - id: activation-positive-request-no-validation
    request: 1
    validation: { passed: false }
    receipt: { emitted: false }
    expected_result: 0
    expected_authority: { accepted: 0, validated: 0, receipted: 0 }

  - id: activation-positive-request-with-validation-no-receipt
    request: 1
    validation: { passed: true }
    receipt: { emitted: false }
    expected_result: 0
    expected_authority: { accepted: 0, validated: 0, receipted: 0 }

  - id: activation-positive-request-with-validation-and-receipt
    request: 1
    validation: { passed: true }
    receipt: { emitted: true }
    expected_result: 1
    expected_authority: { accepted: 1, validated: 1, receipted: 1 }

  # ------------------------------------------------------------------
  # Proof that request != result
  # ------------------------------------------------------------------
  - id: activation-proof-positive-request-not-accepted
    description: "positive request without validation+receipt does not produce accepted result"
    request: 1
    validation: { passed: false }
    receipt: { emitted: false }
    expected:
      result_not_equal_to_request: true
      accepted: 0

  - id: activation-proof-positive-request-not-result
    description: "positive request without receipt produces unresolved result"
    request: 1
    validation: { passed: true }
    receipt: { emitted: false }
    expected:
      result: 0
      note: "positive request ≠ accepted result without receipt"

invariants:
  - "positive request != accepted result"
  - "accepted result requires validation passed AND receipt emitted"
  - "activation request is declaration, not authority"
  - "activation result is authoritative only after validation + receipt"
  - "declaration does not create accepted state"
  - "request does not create receipt"
