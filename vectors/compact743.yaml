# Compact [7,4,3] Conformance Vectors
# Canonical source: omnicron-canon/vectors/compact743.yaml
# Consumed by: omnicron-isa
#
# Bit arrangement:
#   position 1 = LOGOS (check)
#   position 2 = NOMOS (check)
#   position 3 = FS (data)
#   position 4 = PATHOS (check)
#   position 5 = GS (data)
#   position 6 = RS (data)
#   position 7 = US (data)
#
# Check relations (even parity):
#   LOGOS  = FS XOR GS XOR US
#   NOMOS  = FS XOR RS XOR US
#   PATHOS = GS XOR RS XOR US
#
# Syndrome:
#   sLOGOS  = LOGOS XOR FS XOR GS XOR US
#   sNOMOS  = NOMOS XOR FS XOR RS XOR US
#   sPATHOS = PATHOS XOR GS XOR RS XOR US
#   syndrome = sLOGOS + 2 × sNOMOS + 4 × sPATHOS
#
# Codeword: [LOGOS, NOMOS, FS, PATHOS, GS, RS, US]

schema: compact743
version: "1.0"

vectors:
  # ------------------------------------------------------------------
  # Valid codewords: all 16 Scope4 values
  # ------------------------------------------------------------------
  - id: compact-0000
    scope: { fs: 0, gs: 0, rs: 0, us: 0 }
    codeword: [0, 0, 0, 0, 0, 0, 0]
    expected: { valid: true, syndrome: 0 }

  - id: compact-0001
    scope: { fs: 0, gs: 0, rs: 0, us: 1 }
    codeword: [1, 1, 0, 0, 0, 0, 1]
    expected: { valid: true, syndrome: 0 }

