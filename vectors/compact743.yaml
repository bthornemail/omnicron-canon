  # ------------------------------------------------------------------
  # Single-bit corruption cases (112 total: 16 codewords × 7 positions)
  # ------------------------------------------------------------------
  # Example for codeword 0000 (all zeros):
  - id: compact-0000-corrupt-pos1
    source: compact-0000
    corrupted: [1, 0, 0, 0, 0, 0, 0]
    corruption: { position: 1 }
    expected: { syndrome: 1, correctable: true, error_pos: 1 }

  - id: compact-0000-corrupt-pos2
    source: compact-0000
    corrupted: [0, 1, 0, 0, 0, 0, 0]
    corruption: { position: 2 }
    expected: { syndrome: 2, correctable: true, error_pos: 2 }

  - id: compact-0000-corrupt-pos3
    source: compact-0000
    corrupted: [0, 0, 1, 0, 0, 0, 0]
    corruption: { position: 3 }
    expected: { syndrome: 3, correctable: true, error_pos: 3 }

  - id: compact-0000-corrupt-pos4
    source: compact-0000
    corrupted: [0, 0, 0, 1, 0, 0, 0]
    corruption: { position: 4 }
    expected: { syndrome: 4, correctable: true, error_pos: 4 }

  - id: compact-0000-corrupt-pos5
    source: compact-0000
    corrupted: [0, 0, 0, 0, 1, 0, 0]
