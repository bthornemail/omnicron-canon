    corruption: { position: 7 }
    expected: { syndrome: 7, correctable: true, error_pos: 7 }

invariants:
  - "decode(encode(x)) = x for all valid Scope4 values"
  - "syndrome = 0 for all valid codewords"
  - "single-bit error produces syndrome 1..7"
  - "syndrome identifies error position"
  - "correction flips bit at syndrome position"
  - "multi-bit corruption requires frame-level detection"
