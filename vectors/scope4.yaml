# Scope4 Conformance Vectors
# Canonical source: omnicron-canon/vectors/scope4.yaml
# Consumed by: omnicron-isa, omnicron-lisp
#
# Scope4 is a 4-bit epistemic scope codeword.
# Each bit represents a binary scope position:
#   fs — file/source scope
#   gs — group scope
#   rs — record scope
#   us — unit scope

schema: scope4
version: "1.0"

vectors:
  # ------------------------------------------------------------------
  # Valid codewords: all 16 combinations
  # ------------------------------------------------------------------
  - id: scope4-0000
    input: { fs: 0, gs: 0, rs: 0, us: 0 }
    packed: 0
    expected: { valid: true, roundtrip: true }

  - id: scope4-0001
    input: { fs: 0, gs: 0, rs: 0, us: 1 }
    packed: 1
    expected: { valid: true, roundtrip: true }

  - id: scope4-0010
    input: { fs: 0, gs: 0, rs: 1, us: 0 }
    packed: 2
    expected: { valid: true, roundtrip: true }

  - id: scope4-0011
    input: { fs: 0, gs: 0, rs: 1, us: 1 }
    packed: 3
    expected: { valid: true, roundtrip: true }

  - id: scope4-0100
    input: { fs: 0, gs: 1, rs: 0, us: 0 }
    packed: 4
    expected: { valid: true, roundtrip: true }

  - id: scope4-0101
    input: { fs: 0, gs: 1, rs: 0, us: 1 }
    packed: 5
    expected: { valid: true, roundtrip: true }

  - id: scope4-0110
    input: { fs: 0, gs: 1, rs: 1, us: 0 }
    packed: 6
    expected: { valid: true, roundtrip: true }

  - id: scope4-0111
    input: { fs: 0, gs: 1, rs: 1, us: 1 }
    packed: 7
    expected: { valid: true, roundtrip: true }

  - id: scope4-1000
    input: { fs: 1, gs: 0, rs: 0, us: 0 }
    packed: 8
    expected: { valid: true, roundtrip: true }

  - id: scope4-1001
    input: { fs: 1, gs: 0, rs: 0, us: 1 }
    packed: 9
    expected: { valid: true, roundtrip: true }

  - id: scope4-1010
    input: { fs: 1, gs: 0, rs: 1, us: 0 }
    packed: 10
    expected: { valid: true, roundtrip: true }

  - id: scope4-1011
    input: { fs: 1, gs: 0, rs: 1, us: 1 }
    packed: 11
    expected: { valid: true, roundtrip: true }

  - id: scope4-1100
    input: { fs: 1, gs: 1, rs: 0, us: 0 }
    packed: 12
    expected: { valid: true, roundtrip: true }

  - id: scope4-1101
    input: { fs: 1, gs: 1, rs: 0, us: 1 }
    packed: 13
    expected: { valid: true, roundtrip: true }

  - id: scope4-1110
    input: { fs: 1, gs: 1, rs: 1, us: 0 }
    packed: 14
    expected: { valid: true, roundtrip: true }

  - id: scope4-1111
    input: { fs: 1, gs: 1, rs: 1, us: 1 }
    packed: 15
    expected: { valid: true, roundtrip: true }

  # ------------------------------------------------------------------
  # Invalid cases
  # ------------------------------------------------------------------
  - id: scope4-invalid-fs-2
    input: { fs: 2, gs: 0, rs: 0, us: 0 }
    expected: { valid: false, roundtrip: false, error: "non-binary fs" }

  - id: scope4-invalid-fs-255
    input: { fs: 255, gs: 0, rs: 0, us: 0 }
    expected: { valid: false, roundtrip: false, error: "non-binary fs" }

  - id: scope4-invalid-gs-2
    input: { fs: 0, gs: 2, rs: 0, us: 0 }
    expected: { valid: false, roundtrip: false, error: "non-binary gs" }

  - id: scope4-invalid-rs-3
    input: { fs: 0, gs: 0, rs: 3, us: 0 }
    expected: { valid: false, roundtrip: false, error: "non-binary rs" }

  - id: scope4-invalid-us-128
    input: { fs: 0, gs: 0, rs: 0, us: 128 }
    expected: { valid: false, roundtrip: false, error: "non-binary us" }

  - id: scope4-packed-overflow
    packed: 16
    expected: { valid: false, roundtrip: false, error: "out of 4-bit range" }

  - id: scope4-packed-max-overflow
    packed: 255
    expected: { valid: false, roundtrip: false, error: "out of 4-bit range" }

invariants:
  - "unpack(pack(x)) = x for all valid x in 0..15"
  - "pack returns error for values > 15"
  - "all four bits must be binary (0 or 1)"
  - "roundtrip preserves identity"
