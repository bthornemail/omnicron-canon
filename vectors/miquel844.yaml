# Miquel [8,4,4] Conformance Vectors
# Canonical source: omnicron-canon/vectors/miquel844.yaml
# Consumed by: omnicron-isa
#
# Bit ordering (canonical):
#   bit 0 = P000
#   bit 1 = P001
#   bit 2 = P010
#   bit 3 = P011
#   bit 4 = P100
#   bit 5 = P101
#   bit 6 = P110
#   bit 7 = P111
#
# Point indices:
#   bit 2 = LOGOS sign
#   bit 1 = NOMOS sign
#   bit 0 = PATHOS sign
#
# Six incidence masks:
#   LOGOS−  = {P000, P001, P010, P011} = bits 0,1,2,3
#   LOGOS+  = {P100, P101, P110, P111} = bits 4,5,6,7
#   NOMOS−  = {P000, P001, P100, P101} = bits 0,1,4,5
#   NOMOS+  = {P010, P011, P110, P111} = bits 2,3,6,7
#   PATHOS− = {P000, P010, P100, P110} = bits 0,2,4,6
#   PATHOS+ = {P001, P011, P101, P111} = bits 1,3,5,7
#
# Valid codeword: all six checks = 0 (even parity)

schema: miquel844
version: "1.0"

