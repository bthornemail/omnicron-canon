invariants:
  - "decode(encode(x)) = x for all valid Scope4 values"
  - "all six checks = 0 for valid codewords"
  - "single-bit error produces exactly 3 failed checks"
  - "three failed checks uniquely identify one point"
  - "correction flips identified point and recomputes checks"
  - "two-bit error produces syndrome ≠ any single-point column"
  - "double-bit error is detected, not corrected"
  - "double-bit error is not decoded as accepted"
